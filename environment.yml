name: delphi
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # PyTorch — adjust cuda version to match your GPU driver
  - pytorch>=2.2.1
  - pytorch-cuda=12.1
  - pip:
    - numpy>=1.26
    - pandas>=2.2
    - scipy>=1.12
    - scikit-learn>=1.4
    - pyarrow>=15.0
    - transformers>=4.39
    - h5py>=3.10
    - umap-learn>=0.5.6
    - matplotlib>=3.8
    - shap>=0.45
    - tqdm>=4.66
